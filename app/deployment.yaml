apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels:
    app: web
spec:
  replicas: 1                    # change to 3, push, watch pods scale (instant demo)
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: nginx:1.25       # public image — nothing to build/push
          ports:
            - containerPort: 80
          volumeMounts:
            - name: content
              mountPath: /usr/share/nginx/html   # nginx serves the ConfigMap's index.html
      volumes:
        - name: content
          configMap:
            name: web-content
