# This ConfigMap IS your editable "code sample" — the HTML nginx serves.
# Change "Version 2" here, commit, push, and watch ArgoCD update the cluster.
apiVersion: v1
kind: ConfigMap
metadata:
  name: web-content
data:
  index.html: |
    <!DOCTYPE html>
    <html>
      <head><title>GitOps Demo</title></head>
      <body style="font-family: sans-serif; text-align: center; padding-top: 4rem;">
        <h1>Hello from GitOps</h1>
        <h2>Version 6</h2>
        <p>Edit this in Git, push, and ArgoCD syncs the cluster automatically.</p>
      </body>
    </html>
